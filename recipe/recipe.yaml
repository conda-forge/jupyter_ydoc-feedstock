# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.4.1"
  python_check_max: "3.14"

package:
  name: jupyter_ydoc
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyter_ydoc/jupyter_ydoc-${{ version }}.tar.gz
    sha256: fb31f0e7033b8a5bf8920334e2b3dd9bdaba3052de3164de28e14525fd0bc4d8
    target_directory: dist
  - url: https://github.com/jupyter-server/jupyter_ydoc/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 098a2333d718fcdd3cc1d906503120b905a7248b703f72939133c5c4fd57f35f
    target_directory: src

build:
  number: 0
  noarch: python
  script:
    - cd dist
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatch-nodejs-version
    - hatchling >=1.10.0
    - pip
    - python ${{ python_min }}.*
  run:
    - anyio >=4.12.1,<5.0.0
    - pycrdt >=0.10.1,<0.13.0
    - python >=${{ python_min }}

tests:
  - python:
      imports: jupyter_ydoc
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      recipe:
        - run_test.py
      source:
        - src/javascript/
        - src/lerna.json
        - src/package.json
        - src/tests/
        - src/yarn.lock
    requirements:
      run:
        - httpx-ws >=0.5.2
        - hypercorn >=0.16.0
        - nodejs >=22,<23
        - pycrdt-websocket >=0.16.0,<0.17.0
        - pytest-cov
        - python ${{ python_min }}.*
        - yarn <4
    script:
      file: run_test.py
      interpreter: python

about:
  license: BSD-3-Clause
  license_file: dist/LICENSE
  summary: Document structures for collaborative editing using Ypy
  homepage: https://pypi.org/project/jupyter-ydoc
  repository: https://github.com/jupyter-server/jupyter_ydoc
  documentation: https://jupyter-ydoc.readthedocs.io

extra:
  recipe-maintainers:
    - davidbrochart
    - conda-forge/jupyter_server
